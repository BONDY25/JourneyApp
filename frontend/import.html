<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Import</title>
    <link href="styles/styles.css" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="assets/JourneyApp-logo-1.png"/>
</head>
<body>

<!-- =========================================================================================================== -->
<!-- Message Box Overlay -->
<!-- =========================================================================================================== -->

<div id="message-box" class="message-box-card hidden">
    <div class="message-box-header">
        <div class="message-box-content">
            <span id="message-box-title" class="message-box-title">Title</span>
            <p id="message-box-message" class="message-box-message">Message</p>
        </div>
        <div class="message-box-actions">
            <button id="message-box-btn1" class="message-box-btn1" type="button">Button 1</button>
            <button id="message-box-btn2" class="message-box-btn2" type="button">Button 2</button>
        </div>
    </div>
</div>

<!-- =========================================================================================================== -->
<!-- Loader Overlay -->
<!-- =========================================================================================================== -->

<div id="loader" class="loader-overlay">
    <span class="loader"></span>
</div>

<!-- =========================================================================================================== -->
<!-- App Container -->
<!-- =========================================================================================================== -->

<div id="app" class="app">
    <h1>Import</h1>
    <hr>
    <div id="sum-stats" class="stats">
        <input type="file" id="csvFile" accept=".csv" required/>
    </div>
    <div class=button-group>
        <button id="importBtn" class="button">Import</button>
        <a href="new-journey.html">
            <button type="button" id="back" class="button">Back</button>
        </a>
    </div>
</div>

<!-- =========================================================================================================== -->
<!-- Scripts -->
<!-- =========================================================================================================== -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script type="module" src="js/import.js"></script>
</body>
</html>
