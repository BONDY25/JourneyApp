<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journey App - Info</title>
  <link href="styles/styles.css" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="assets/JourneyApp-logo-1.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>

<!-- =========================================================================================================== -->
<!-- Message Box Overlay -->
<!-- =========================================================================================================== -->

<div id="message-box" class="message-box-card hidden">
  <div class="message-box-header">
    <div class="message-box-content">
      <span id="message-box-title" class="message-box-title">Title</span>
      <p id="message-box-message" class="message-box-message">Message</p>
    </div>
    <div class="message-box-actions">
      <button id="message-box-btn1" class="message-box-btn1" type="button">Button 1</button>
      <button id="message-box-btn2" class="message-box-btn2" type="button">Button 2</button>
    </div>
  </div>
</div>

<!-- =========================================================================================================== -->
<!-- Loader Overlay -->
<!-- =========================================================================================================== -->

<div id="app" class="app" style = "height:1600px">
  <h1>Info</h1>
  <hr>
</div>
<div id="nav-bar">
  <a href="home.html" class="nav-item" id="nav-home">
    <span class="material-symbols-outlined">home</span>
    <span class="label">Home</span>
  </a>
  <a href="new-journey.html" class="nav-item" id="nav-add">
    <span class="material-symbols-outlined">add_circle</span>
    <span class="label">Add</span>
  </a>
  <a href="your-journeys.html" class="nav-item" id="nav-journeys">
    <span class="material-symbols-outlined">directions_car</span>
    <span class="label">Journeys</span>
  </a>
  <a href="full-stats.html" class="nav-item" id="nav-stats">
    <span class="material-symbols-outlined">query_stats</span>
    <span class="label">Stats</span>
  </a>
  <a href="settings.html" class="nav-item" id="nav-settings">
    <span class="material-symbols-outlined">settings</span>
    <span class="label">Settings</span>
  </a>
</div>
</body>
</html>
